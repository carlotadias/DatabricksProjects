# SSE Connect Pipeline — Databricks Asset Bundle
#
# Only 2 variables — the environment-level settings that change between dev/prod.
# Everything else (sources, schemas, encryption, paths) lives in conf/sources.yml.
#
# Deploy:  databricks bundle deploy --profile=tko-day3
# Run:     databricks bundle run sse_pipeline --profile=tko-day3

bundle:
  name: sse_metadata_pipeline

variables:
  catalog:
    default: carlota_tko_day3_catalog
  bronze_schema:
    default: sse_bronze

resources:

  pipelines:
    connect_pipeline:
      name: sse_connect_pipeline
      serverless: true
      catalog: ${var.catalog}
      target: ${var.bronze_schema}
      libraries:
        - notebook:
            path: ./notebooks/pipeline/ingest_and_decrypt.py
        - notebook:
            path: ./notebooks/pipeline/bronze_tables.py
        - notebook:
            path: ./notebooks/pipeline/pdv_tables.py
        - notebook:
            path: ./notebooks/pipeline/derived_joins.py
      configuration:
        config_table: "${var.catalog}.sse_demo.pipeline_config"

  jobs:
    sse_pipeline:
      name: sse_pipeline
      environments:
        - environment_key: serverless
          spec:
            client: "1"
      tasks:
        - task_key: load_config
          notebook_task:
            notebook_path: ./notebooks/setup_config.py
            base_parameters:
              catalog: "${var.catalog}"
              config_schema: "sse_demo"
              bronze_schema: "${var.bronze_schema}"
              config_file: "sources.yml"
              force_refresh: "false"
          environment_key: serverless

        - task_key: encrypt_staging_to_raw
          depends_on:
            - task_key: load_config
          notebook_task:
            notebook_path: ./notebooks/encrypt_staging_to_raw.py
            base_parameters:
              config_table: "${var.catalog}.sse_demo.pipeline_config"
          environment_key: serverless

        - task_key: run_pipeline
          depends_on:
            - task_key: encrypt_staging_to_raw
          pipeline_task:
            pipeline_id: ${resources.pipelines.connect_pipeline.id}

        - task_key: apply_column_masks
          depends_on:
            - task_key: run_pipeline
          notebook_task:
            notebook_path: ./notebooks/apply_column_masks.py
            base_parameters:
              config_table: "${var.catalog}.sse_demo.pipeline_config"
              bronze_schema: "${var.bronze_schema}"
          environment_key: serverless

targets:
  dev:
    default: true
    workspace:
      host: https://fevm-carlota-tko-day3.cloud.databricks.com
    variables:
      catalog: carlota_tko_day3_catalog
      bronze_schema: sse_bronze

  prod:
    workspace:
      host: https://fevm-carlota-tko-day3.cloud.databricks.com
    variables:
      catalog: sse_prod_catalog
      bronze_schema: sse_bronze
