# SSE Pipeline — Source Configuration
#
# This file defines everything the pipeline needs:
#   settings  → pipeline-level config (storage roots, encryption, access control)
#   sources   → one block per data source (prefix, schema, columns, PII)
#
# All sources land in the same storage container (volume) but under
# different prefixes — mirrors real-world S3 / ADLS layout where one
# container holds data from multiple upstream systems, each in its own
# key prefix.
#
# Full paths are assembled at load time: staging_root/prefix, raw_root/prefix
#
# To add a new source: add a block under sources and redeploy.
# To add a new property: just include it — the MAP accepts anything.

settings:
  volume: sse_data
  staging_root: /Volumes/${catalog}/${config_schema}/sse_data/staging
  raw_root: /Volumes/${catalog}/${config_schema}/sse_data/raw
  ad_group: sse-pii-authorized
  encryption_key: "0123456789abcdef0123456789abcdef"

sources:

  - name: contact_records
    prefix: amazon_connect/contact_records
    format: json
    schema: >
      contact_id STRING, channel STRING, initiation_method STRING,
      queue_name STRING, agent_id STRING, customer_phone STRING,
      customer_name STRING, start_time STRING, end_time STRING,
      duration_seconds INT, hold_duration_seconds INT,
      after_call_work_seconds INT, disconnect_reason STRING, outcome STRING
    bronze_columns:
      - contact_id
      - channel
      - initiation_method
      - queue_name
      - agent_id
      - start_time
      - end_time
      - duration_seconds
      - hold_duration_seconds
      - after_call_work_seconds
      - disconnect_reason
      - outcome
    pii_columns:
      - customer_phone
      - customer_name
    join_key: contact_id
    pdv_table: pdv_contact_records

  - name: agent_events
    prefix: amazon_connect/agent_events
    format: json
    schema: >
      event_id STRING, agent_id STRING, agent_name STRING,
      agent_email STRING, event_type STRING, status STRING,
      queue_name STRING, timestamp STRING
    bronze_columns:
      - event_id
      - agent_id
      - agent_name
      - event_type
      - status
      - queue_name
      - timestamp
    pii_columns:
      - agent_email
    join_key: event_id

  - name: transcripts
    prefix: amazon_connect/transcripts
    format: json
    schema: >
      transcript_id STRING, contact_id STRING, turn_number INT,
      participant STRING, content STRING, sentiment STRING,
      start_offset_ms BIGINT, end_offset_ms BIGINT
    bronze_columns:
      - transcript_id
      - contact_id
      - turn_number
      - participant
      - sentiment
      - start_offset_ms
      - end_offset_ms
    pii_columns:
      - content
    join_key: transcript_id
    pdv_table: pdv_transcripts
